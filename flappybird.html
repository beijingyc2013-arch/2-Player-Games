<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<title>FlappyBird</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #74ebd5, #9face6);
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  /* START OVERLAY */
  #startOverlay {
    position: fixed;
    inset: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(14px);
  }

  #startBox {
    text-align: center;
    padding: 30px 40px;
    border-radius: 18px;
    background: rgba(255,255,255,0.15);
    color: white;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  #startBtn {
    margin-top: 15px;
    padding: 12px 24px;
    font-size: 18px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: white;
  }

  #startBtn:hover {
    transform: scale(1.05);
  }

  /* GAME OVER */
  #overlay {
    position: fixed;
    inset: 0;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(14px);
    color: white;
  }

  #winner {
    font-size: 48px;
    font-weight: bold;
    margin-bottom: 20px;
  }

  #restart {
    padding: 14px 26px;
    font-size: 18px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    background: white;
  }

  #restart:hover {
    transform: scale(1.05);
  }
</style>
</head>

<body>

<canvas id="game"></canvas>

<!-- START SCREEN -->
<div id="startOverlay">
  <div id="startBox">
    <h1>Flappy Bird</h1>
    <p>🔴 Red: W</p>
    <p>🟢 Green: ↑</p>
    <button id="startBtn">Start Game</button>
  </div>
</div>

<!-- GAME OVER -->
<div id="overlay">
  <div id="winner"></div>
  <button id="restart">Restart</button>
</div>

<script>

// -------------------- ELEMENTS --------------------
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const startOverlay = document.getElementById("startOverlay");
const startBtn = document.getElementById("startBtn");

const overlay = document.getElementById("overlay");
const winnerText = document.getElementById("winner");
const restartBtn = document.getElementById("restart");

// -------------------- STATE --------------------
let started = false;
let gameOver = false;

let red, lime, pipes, frame;

const gravity = 0.45;
const jump = -8;

// -------------------- RESIZE --------------------
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

// -------------------- RESET --------------------
function reset() {
  red = { x: 120, y: canvas.height / 2, vy: 0, color: "red", alive: true };
  lime = { x: 180, y: canvas.height / 2, vy: 0, color: "lime", alive: true };

  pipes = [];
  frame = 0;
  gameOver = false;

  overlay.style.display = "none";
}

// -------------------- START --------------------
startBtn.onclick = () => {
  startOverlay.style.display = "none";
  started = true;
  requestAnimationFrame(update);
};

// -------------------- RESTART --------------------
restartBtn.onclick = () => {
  reset();
  started = true;
  requestAnimationFrame(update);
};

// -------------------- CONTROLS --------------------
document.addEventListener("keydown", (e) => {
  if (!started) return;

  if (e.code === "KeyW") red.vy = jump;
  if (e.code === "ArrowUp") lime.vy = jump;
});

// -------------------- PIPES --------------------
function addPipe() {
  const gap = 180;
  const top = Math.random() * (canvas.height - gap - 200) + 100;
  pipes.push({ x: canvas.width, top, gap });
}

function hit(b, p) {
  return (
    b.x < p.x + 70 &&
    b.x + 25 > p.x &&
    (b.y < p.top || b.y + 25 > p.top + p.gap)
  );
}

// -------------------- BIRDS --------------------
function updateBird(b) {
  if (!b.alive) return;

  b.vy += gravity;
  b.y += b.vy;

  if (b.y < 0 || b.y > canvas.height - 25) {
    b.alive = false;
  }
}

function drawBird(b) {
  if (!b.alive) return;

  ctx.fillStyle = b.color;
  ctx.shadowBlur = 18;
  ctx.shadowColor = b.color;
  ctx.fillRect(b.x, b.y, 25, 25);
  ctx.shadowBlur = 0;
}

// -------------------- GAME OVER --------------------
function showGameOver() {
  gameOver = true;
  overlay.style.display = "flex";

  if (!red.alive && !lime.alive) {
    winnerText.textContent = "Draw!";
    winnerText.style.color = "white";
  } else if (!red.alive) {
    winnerText.textContent = "Green wins!";
    winnerText.style.color = "lime";
  } else {
    winnerText.textContent = "Red wins!";
    winnerText.style.color = "red";
  }
}

// -------------------- PIPE DRAW --------------------
function drawPipe(x, y, h) {
  if (h <= 0) return;

  const width = 70;

  const grad = ctx.createLinearGradient(x, 0, x + width, 0);
  grad.addColorStop(0, "#1e7f3c");
  grad.addColorStop(0.5, "#2ecc71");
  grad.addColorStop(1, "#145a2a");

  ctx.fillStyle = grad;
  ctx.fillRect(x, y, width, h);

  ctx.strokeStyle = "rgba(0,0,0,0.25)";
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, width, h);

  ctx.fillStyle = "rgba(255,255,255,0.15)";
  ctx.fillRect(x + 8, y, 6, h);

  ctx.fillStyle = "#1b8f45";

  if (y === 0) {
    ctx.fillRect(x - 5, h - 15, width + 10, 15);
  } else {
    ctx.fillRect(x - 5, y, width + 10, 15);
  }

  ctx.shadowColor = "rgba(0,0,0,0.3)";
  ctx.shadowBlur = 10;
  ctx.shadowOffsetY = 4;
  ctx.fillRect(x, y, width, h);
  ctx.shadowBlur = 0;
  ctx.shadowOffsetY = 0;
}

// -------------------- UPDATE LOOP --------------------
function update() {
  if (!started) return;
  if (gameOver) return;

  frame++;

  if (frame % 100 === 0) addPipe();

  pipes.forEach(p => p.x -= 3);

  pipes.forEach(p => {
    if (hit(red, p)) red.alive = false;
    if (hit(lime, p)) lime.alive = false;
  });

  updateBird(red);
  updateBird(lime);

  if (!red.alive || !lime.alive) {
    showGameOver();
    return;
  }

  draw();
  requestAnimationFrame(update);
}

// -------------------- DRAW --------------------
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  pipes.forEach(p => {
    drawPipe(p.x, 0, p.top);
    drawPipe(p.x, p.top + p.gap, canvas.height - (p.top + p.gap));
  });

  drawBird(red);
  drawBird(lime);
}

// -------------------- INIT --------------------
reset();

</script>

</body>
</html>
