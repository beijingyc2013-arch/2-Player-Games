<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>PongGame</title>
<style>
/* Algemene pagina */
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: sans-serif;
  color: white;
  flex-direction: column;
  overflow: hidden; /* voorkomt scrollbars bij overlay */
}

/* Canvas */
canvas {
  border: 2px solid white;
  background: black;
  transition: filter 0.3s; /* voor blur-effect */
}

/* Wazig effect bij game over */
canvas.blur {
  filter: blur(8px);
}

/* Game-over overlay */
#gameOverScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;

  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;

  background: rgba(0,0,0,0.5); /* donker, semi-transparant */
  z-index: 1000;
}

/* Winnaartekst */
#winnerText {
  font-size: 40px;
  margin: 0;
  color: white;
  text-shadow: 0 0 20px black;
  text-align: center;
}

/* Opnieuw spelen knop */
button {
  margin-top: 20px;
  padding: 12px 24px;
  font-size: 20px;
  cursor: pointer;
  color: white;
  background: rgba(0,0,0,0.7);
  border: 2px solid white;
  border-radius: 5px;
  transition: background 0.2s, transform 0.1s;
}

button:hover {
  background: rgba(255,255,255,0.2);
  transform: scale(1.05);
}
</style>
</head>
<body>

<div id="gameOverScreen">
  <h1 id="winnerText"></h1>
  <button onclick="restartGame()">Play again</button>
</div>

<canvas id="pong" width="1200" height="600"></canvas>

<script>
const canvas = document.getElementById("pong");
const ctx = canvas.getContext("2d");

const gameOverScreen = document.getElementById("gameOverScreen");
const winnerText = document.getElementById("winnerText");

const paddleW = 10, paddleH = 150; // groter paddle bij groter veld
let player1Y = canvas.height/2 - paddleH/2;
let player2Y = canvas.height/2 - paddleH/2;

let ball = { x: canvas.width/2, y: canvas.height/2, vx: 0, vy: 0, r: 12 };

let player1Score = 0;
let player2Score = 0;
const WIN_SCORE = 10;

let running = true;
const keys = { w:false, s:false, ArrowUp:false, ArrowDown:false };

function drawRect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x,y,w,h); }
function drawCircle(x,y,r,c){ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill(); }
function drawText(t,x,y,c){ ctx.fillStyle=c; ctx.font="40px Arial"; ctx.fillText(t,x,y); }

function resetBall(){
  ball.x = canvas.width/2;
  ball.y = canvas.height/2;
  ball.vx = 0;
  ball.vy = 0;
  setTimeout(() => {
    let angle = (Math.random()*Math.PI/4 - Math.PI/8);
    ball.vx = (Math.random()<0.5?-1:1) * 6 * Math.cos(angle); // iets sneller voor groot veld
    ball.vy = 6 * Math.sin(angle);
  }, 1500);
}

function startGame(){
  player1Score = 0;
  player2Score = 0;
  player1Y = canvas.height / 2 - paddleH / 2;
  player2Y = canvas.height / 2 - paddleH / 2;
  running = true;
  resetBall();
  gameOverScreen.style.display = "none";

  // blur verwijderen
  canvas.classList.remove("blur");

  loop();
}

function update(){
  if(!running) return;
  if(ball.vx===0 && ball.vy===0) return; // wacht tijdens pauze

  ball.x += ball.vx;
  ball.y += ball.vy;

  if(ball.y - ball.r < 0 || ball.y + ball.r > canvas.height){
    ball.vy *= -1;
  }

  // speler 1
  if(ball.x - ball.r < paddleW){
    if(ball.y > player1Y && ball.y < player1Y + paddleH){
      let hit = (ball.y - (player1Y + paddleH/2)) / (paddleH/2);
      let speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
      let angle = hit * Math.PI/4;
      ball.vx = speed * Math.cos(angle);
      ball.vy = speed * Math.sin(angle);
      if(ball.vx < 0) ball.vx *= -1;
    } else {
      player2Score++;
      checkWin();
      resetBall();
    }
  }

  // speler 2
  if(ball.x + ball.r > canvas.width - paddleW){
    if(ball.y > player2Y && ball.y < player2Y + paddleH){
      let hit = (ball.y - (player2Y + paddleH/2)) / (paddleH/2);
      let speed = Math.sqrt(ball.vx*ball.vx + ball.vy*ball.vy);
      let angle = hit * Math.PI/4;
      ball.vx = -speed * Math.cos(angle);
      ball.vy = speed * Math.sin(angle);
      if(ball.vx > 0) ball.vx *= -1;
    } else {
      player1Score++;
      checkWin();
      resetBall();
    }
  }

  // paddle beweging
  if(keys.w) player1Y -= 7;
  if(keys.s) player1Y += 7;
  if(keys.ArrowUp) player2Y -= 7;
  if(keys.ArrowDown) player2Y += 7;

  // grenzen
  player1Y = Math.max(0, Math.min(canvas.height - paddleH, player1Y));
  player2Y = Math.max(0, Math.min(canvas.height - paddleH, player2Y));
}

function checkWin(){
  if(player1Score >= WIN_SCORE) endGame("Red wins!", "red");
  if(player2Score >= WIN_SCORE) endGame("Green wins!", "lime");
}

function endGame(text, color){
  running = false;
  winnerText.textContent = text;
  winnerText.style.color = color;
  gameOverScreen.style.display = "flex";

  // blur toevoegen
  canvas.classList.add("blur");
}

function draw(){
  drawRect(0,0,canvas.width,canvas.height,"black");
  drawRect(0,player1Y,paddleW,paddleH,"red");
  drawRect(canvas.width-paddleW,player2Y,paddleW,paddleH,"lime");
  drawCircle(ball.x,ball.y,ball.r,"white");
  drawText(player1Score, canvas.width/4, 50,"red");
  drawText(player2Score, 3*canvas.width/4, 50,"lime");
}

function loop(){
  if(!running) return;
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown", e => { keys[e.key]=true; });
document.addEventListener("keyup", e => { keys[e.key]=false; });

function restartGame(){ startGame(); }

startGame();
</script>

</body>
</html>
