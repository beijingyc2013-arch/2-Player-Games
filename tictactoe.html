<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TicTacToe</title>

  <style>

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .board {
      transform: scale(1.1);
    }

    body {
      font-family: system-ui, Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;

      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;

      width: 100vw;
      height: 100vh;
    }

    h1 {
      margin-bottom: 10px;
    }

    .board-wrapper {
      position: relative;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
      margin-top: 20px;
      transition: 0.3s;
    }

    .cell {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      cursor: pointer;
      transition: 0.2s;
      user-select: none;
    }

    .cell:hover {
      transform: scale(1.05);
      background: rgba(255,255,255,0.15);
    }

    .cell.x {
      color: #ff3b3b;
      text-shadow: 0 0 10px rgba(255,0,0,0.6);
    }

    .cell.o {
      color: lime;
      text-shadow: 0 0 10px rgba(0,255,0,0.6);
    }

    .blur {
      filter: blur(6px);
      opacity: 0.6;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(6px);
      border-radius: 15px;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
      text-align: center;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .gameover {
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .winner {
      font-size: 1.5rem;
      margin-top: 10px;
    }

    #status {
      margin-top: 20px;
      font-size: 1.1rem;
      opacity: 0.8;
    }

    .restart {
      margin-top: 15px;
      padding: 10px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: 0.2s;
    }

    .restart:hover {
      background: rgba(255,255,255,0.18);
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <h1>Tic Tac Toe</h1>

  <div class="board-wrapper">
    <div class="board" id="board"></div>

    <div class="overlay" id="overlay">
      <div class="gameover">GAME OVER</div>
      <div class="winner" id="winnerText"></div>
    </div>
  </div>

  <div id="status">Player X's turn</div>
  <button class="restart" onclick="resetGame()">Restart</button>

  <script>
    const board = document.getElementById("board");
    const statusText = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const winnerText = document.getElementById("winnerText");

    let currentPlayer = "X";
    let gameState = Array(9).fill("");
    let gameActive = true;

    const winPatterns = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function createBoard() {
      board.innerHTML = "";
      gameState.forEach((_, index) => {
        const cell = document.createElement("div");
        cell.classList.add("cell");
        cell.addEventListener("click", () => makeMove(index));
        board.appendChild(cell);
      });
    }

    function makeMove(index) {
      if (!gameActive || gameState[index] !== "") return;

      gameState[index] = currentPlayer;
      renderBoard();

      if (checkWin()) {
        endGame(`Player ${currentPlayer} wins!`, currentPlayer);
        return;
      }

      if (!gameState.includes("")) {
        endGame("Draw!", null);
        return;
      }

      currentPlayer = currentPlayer === "X" ? "O" : "X";
      statusText.textContent = `Player ${currentPlayer}'s turn`;
    }

    function renderBoard() {
      const cells = document.querySelectorAll(".cell");

      cells.forEach((cell, i) => {
        const value = gameState[i];
        cell.textContent = value;

        cell.classList.remove("x", "o");

        if (value === "X") cell.classList.add("x");
        if (value === "O") cell.classList.add("o");
      });
    }

    function checkWin() {
      return winPatterns.some(([a,b,c]) => {
        return gameState[a] &&
               gameState[a] === gameState[b] &&
               gameState[a] === gameState[c];
      });
    }

    function endGame(message, winner) {
      gameActive = false;

      document.querySelector(".board").classList.add("blur");
      overlay.classList.add("show");

      if (winner === "X") {
        winnerText.style.color = "#ff3b3b";
      } else if (winner === "O") {
        winnerText.style.color = "lime";
      } else {
        winnerText.style.color = "white";
      }

      winnerText.textContent = message;
      statusText.textContent = "Play again";
    }

    function resetGame() {
      currentPlayer = "X";
      gameState = Array(9).fill("");
      gameActive = true;

      document.querySelector(".board").classList.remove("blur");
      overlay.classList.remove("show");

      statusText.textContent = "Player X's turn";
      createBoard();
    }

    createBoard();
  </script>

</body>
</html>
