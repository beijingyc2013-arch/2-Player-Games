<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SimonSays</title>

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
  overflow: hidden;
  font-family: system-ui, Arial;
  background: radial-gradient(circle at top, #1a1a2a, #05050a);
  color: white;
}

body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* HEADER */
h1 {
  margin: 0;
}

.info {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  opacity: 0.9;
}

.card {
  background: rgba(255,255,255,0.08);
  padding: 6px 12px;
  border-radius: 10px;
}

/* BOARD */
.board {
  margin-top: 25px;
  width: min(80vmin, 520px);
  height: min(80vmin, 520px);
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 14px;
}

.btn {
  border-radius: 22px;
  cursor: pointer;
  opacity: 0.8;
  transition: 0.15s;
  box-shadow: 0 15px 40px rgba(0,0,0,0.5);
}

.btn:active {
  transform: scale(0.96);
}

/* COLORS */
.red { background: linear-gradient(135deg,#ff3b3b,#8b0000); }
.green { background: linear-gradient(135deg,#2dff8a,#007a33); }
.blue { background: linear-gradient(135deg,#3aa9ff,#0040a0); }
.yellow { background: linear-gradient(135deg,#ffe85a,#b38600); }

/* FLASH */
.active {
  animation: flash 0.4s ease;
}

@keyframes flash {
  0% { transform: scale(1); filter: brightness(1); }
  50% { transform: scale(1.1); filter: brightness(3); }
  100% { transform: scale(1); filter: brightness(1.2); }
}

/* GAME OVER OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(12px);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 999;
  text-align: center;
}

#overlay h2 {
  font-size: 44px;
  margin: 0;
}

#winner {
  margin-top: 10px;
  font-size: 22px;
  opacity: 0.9;
}

button {
  margin-top: 20px;
  padding: 12px 18px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  font-weight: bold;
  background: white;
  color: black;
}

.turn-red {
  color: red;
  font-weight: bold;
  text-shadow: 0 0 10px red;
}

.turn-lime {
  color: lime;
  font-weight: bold;
  text-shadow: 0 0 10px lime;
}

.win-red {
  color: red;
  font-weight: bold;
  text-shadow: 0 0 12px red;
}

.win-lime {
  color: lime;
  font-weight: bold;
  text-shadow: 0 0 12px lime;
}
</style>
</head>

<body>

<h1>Simon Says</h1>

<div class="info">
  <div class="card">Level: <span id="level">0</span></div>
  <div class="card">Aan de beurt: <span id="turn">Player 1</span></div>
</div>

<div class="board">
  <div class="btn red" onclick="playerClick('red')"></div>
  <div class="btn green" onclick="playerClick('green')"></div>
  <div class="btn blue" onclick="playerClick('blue')"></div>
  <div class="btn yellow" onclick="playerClick('yellow')"></div>
</div>

<!-- GAME OVER -->
<div id="overlay">
  <h2>Game Over</h2>
  <div id="winner"></div>
  <button onclick="restart()">Play again</button>
</div>

<script>
let isPlaying = false;
let canPlay = false;

const colors = ["red","green","blue","yellow"];

let sequence = [];
let input = [];
let level = 0;
let player = 1;

function startGame() {
  sequence = [];
  input = [];
  level = 0;
  player = 1;
  nextRound();
  updateUI();
}

function nextRound() {
  input = [];
  level++;
  updateUI();

  sequence.push(colors[Math.floor(Math.random() * 4)]);
  playSequence();
}

function playSequence() {
  isPlaying = true;
  canPlay = false;

  let i = 0;
  const t = setInterval(() => {
    flash(sequence[i]);
    i++;

    if (i >= sequence.length) {
      clearInterval(t);

      setTimeout(() => {
        isPlaying = false;
        canPlay = true; // ⭐ pas hier mag je klikken
      }, 400);
    }
  }, 600);
}

function flash(c) {
  const el = document.querySelector("." + c);
  el.classList.add("active");
  setTimeout(() => el.classList.remove("active"), 350);
}

function playerClick(c) {
  if (isPlaying || !canPlay) return;

  flash(c);
  input.push(c);

  let i = input.length - 1;

  if (input[i] !== sequence[i]) {
    gameOver();
    return;
  }

  if (input.length === sequence.length) {
    canPlay = false; // ⭐ voorkom dubbele triggers
    player = player === 1 ? 2 : 1;
    updateUI();
    setTimeout(nextRound, 800);
  }
}

function gameOver() {
  isPlaying = true; // ❌ alles blokkeren

  document.querySelectorAll(".btn").forEach(b => b.style.pointerEvents = "none");

  const winner = player === 1 ? 2 : 1;

  const winnerText = document.getElementById("winner");
  winnerText.innerText = "Player " + winner + " wins! 🏆";

  if (winner === 1) {
    winnerText.className = "win-red";
  } else {
    winnerText.className = "win-lime";
  }

  document.getElementById("overlay").style.display = "flex";
}

function restart() {
  document.getElementById("overlay").style.display = "none";
  document.querySelectorAll(".btn").forEach(b => b.style.pointerEvents = "auto");
  startGame();
}

function updateUI() {
  document.getElementById("level").innerText = level;

  const turnEl = document.getElementById("turn");

  turnEl.innerText = "Player " + player;

  turnEl.classList.remove("turn-red", "turn-lime");

  if (player === 1) {
    turnEl.classList.add("turn-red");
  } else {
    turnEl.classList.add("turn-lime");
  }
}
startGame();
</script>

</body>
</html>
